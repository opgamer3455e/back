<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE-7 // SURVEILLANCE FEED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <main class="dashboard">
        <header class="top-bar">
            <div class="sys-info">SYS.OP: ACTIVE | MEMORY: ALLOCATING | UPLINK: STANDBY</div>
            <h1 class="brand">N-7 // FEED PROTOCOL</h1>
            <div class="time" id="sys-time">00:00:00:00</div>
        </header>

        <section class="grid-core">
            <div class="camera-module">
                <div class="cam-header">
                    <span>OPTIC_SENSOR_01</span>
                    <div class="status-indicator" id="cam-status">OFFLINE</div>
                </div>
                <div class="video-container">
                    <video id="webcam-preview" autoplay muted playsinline></video>
                    <div class="overlay-crosshair">
                        <div class="c-h"></div>
                        <div class="c-v"></div>
                    </div>
                    <div class="recording-badge hidden" id="rec-badge">REC</div>
                </div>
                <div class="cam-controls">
                    <button class="sys-btn" id="btn-init">INIT SENSOR</button>
                    <button class="sys-btn danger hidden" id="btn-halt">KILL ALL PROCESSES</button>
                </div>
            </div>

            <div class="data-module">
                <div class="module-title">BUFFER & TRANSMISSION LOG</div>
                <div class="terminal" id="terminal-log">
                    <div class="log-line">SYSTEM BOOT... OK</div>
                    <div class="log-line">WAITING FOR SENSOR INITIALIZATION...</div>
                </div>
                
                <div class="memory-stats">
                    <span>BUFFER RETENTION: 30 MIN MAX</span>
                    <span>CHUNKS IN MEM: <span id="chunk-count">0</span></span>
                </div>
                
                <div class="upload-config">
                    <div class="cfg-row">
                        <label>TARGET UPLINK</label>
                        <span class="value">back-ednt.onrender.com</span>
                    </div>

                    <div class="cfg-row">
                        <label>FPS</label>
                        <select id="fps-config">
                            <option value="30">30</option>
                            <option value="24">24</option>
                            <option value="15">15</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
